<header class="header">
  <a href="/" class="logo">
    {{ $logo := resources.Get "img/header.png" }}
    {{ if $logo }}
    <img src="{{ $logo.RelPermalink }}" alt="{{ .Site.Title }}">
    {{ end }}
    wan0.net
  </a>
  <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <nav class="nav" id="siteNav">
    {{ range .Site.Menus.main }}
      {{ if .Params.action }}{{ else }}
      <a href="{{ .URL }}"{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    {{ end }}
  </nav>
  <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme"></button>
</header>
